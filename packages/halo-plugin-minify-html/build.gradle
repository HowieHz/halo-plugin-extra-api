import top.howiehz.gradle.YamlPluginVersionSupport

plugins {
    id 'java'
    id 'io.freefair.lombok' version '9.5.0'
    id 'run.halo.plugin.devtools' version '0.8.0' apply false
}

apply plugin: 'run.halo.plugin.devtools'

group = 'top.howiehz.halo.plugin.minify.html'
version = rootProject.findProperty('minifyHtmlVersion')

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

def platforms = [
    'Linux-arm64'   : 'linux-arm64',
    'Linux-x86_64'  : 'linux-x86_64',
    'Macos-arm64'   : 'macos-arm64',
    'Macos-x86_64'  : 'macos-x86_64',
    'Windows-x86_64': 'windows-x86_64'
]

def minifyHtmlNativeLibsByVariant = [
    'Linux-arm64'   : 'linux-aarch64.nativelib',
    'Linux-x86_64'  : 'linux-x64.nativelib',
    'Macos-arm64'   : 'mac-aarch64.nativelib',
    'Macos-x86_64'  : 'mac-x64.nativelib',
    'Windows-x86_64': 'win-x64.nativelib'
]

def runtimeClasspathTrees = { configuration, String selectedMinifyHtmlNativeLib = null ->
    configuration.resolvedConfiguration.resolvedArtifacts.collect { artifact ->
        def artifactFile = artifact.file
        if (artifactFile.isDirectory()) {
            return artifactFile
        }
        def artifactTree = zipTree(artifactFile)
        if (artifact.moduleVersion.id.group == 'in.wilsonl.minifyhtml'
            && artifact.name == 'minify-html'
            && selectedMinifyHtmlNativeLib != null) {
            return artifactTree.matching {
                exclude { details ->
                    details.path.endsWith('.nativelib')
                        && details.path != selectedMinifyHtmlNativeLib
                }
            }
        }
        return artifactTree
    }
}

platforms.each { variant, ignored ->
    configurations.create("minifyHtml${variant}") {
        extendsFrom configurations.runtimeClasspath
    }
}

configurations {
    minifyHtmlAllPlatforms {
        extendsFrom configurations.runtimeClasspath
    }
}

dependencies {
    implementation platform('run.halo.tools.platform:plugin:2.25.0')
    compileOnly 'run.halo.app:api'
    compileOnly 'org.springframework:spring-context'
    compileOnly 'org.springframework:spring-core'
    compileOnly 'org.springframework:spring-beans'
    compileOnly 'io.projectreactor:reactor-core'

    implementation 'in.wilsonl.minifyhtml:minify-html:0.18.1'

    testImplementation 'run.halo.app:api'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

def configurePluginYamlVersion() {
    def manifestFile = file('src/main/resources/plugin.yaml')
    return YamlPluginVersionSupport.configurePluginYamlVersion(project, manifestFile)
}

def indexTasks = [:]

afterEvaluate {
    tasks.matching { it.name == 'generatePluginComponentsIdx' }.configureEach {
        enabled = false
    }

    def MultiJarPluginComponentsIndexTask = top.howiehz.gradle.MultiJarPluginComponentsIndexTask

    def registerIndexTask = { String targetJarTaskName ->
        def indexTaskName = "generatePluginComponentsIdx${targetJarTaskName.capitalize()}"
        indexTasks[targetJarTaskName] = tasks.register(indexTaskName, MultiJarPluginComponentsIndexTask) {
            group = 'halo server'
            description = "Generates plugin components index for ${targetJarTaskName}"
            classesDirs.from(sourceSets.main.output.classesDirs)
            jarTaskName.set(targetJarTaskName)
            outputFile.set(layout.buildDirectory.file("tmp/${targetJarTaskName}/META-INF/plugin-components.idx"))
            doFirst(configurePluginYamlVersion())
        }
    }

    registerIndexTask('jarAllPlatforms')
    platforms.each { variant, ignored ->
        registerIndexTask("jar${variant}")
    }

    tasks.register('jarAllPlatforms', Jar) {
        group = 'build'
        description = 'Assembles minify-html with all native libraries'
        archiveFileName = "minify-html-all-platforms-${project.version}.jar"
        from(sourceSets.main.output)
        from(runtimeClasspathTrees(configurations.minifyHtmlAllPlatforms))
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        dependsOn 'classes', indexTasks.jarAllPlatforms
        into('META-INF') {
            from indexTasks.jarAllPlatforms.get().outputFile
            rename { 'plugin-components.idx' }
        }
    }

    platforms.each { variant, ignored ->
        def taskName = "jar${variant}"
        def configName = "minifyHtml${variant}"
        def nativeLib = minifyHtmlNativeLibsByVariant[variant]
        tasks.register(taskName, Jar) {
            group = 'build'
            description = "Assembles minify-html for ${variant}"
            archiveFileName = "minify-html-${variant.toLowerCase()}-${project.version}.jar"
            from(sourceSets.main.output)
            from(runtimeClasspathTrees(configurations.getByName(configName), nativeLib))
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE
            dependsOn 'classes', indexTasks[taskName]
            into('META-INF') {
                from indexTasks[taskName].get().outputFile
                rename { 'plugin-components.idx' }
            }
        }
    }
}

jar {
    enabled = false
    dependsOn 'jarAllPlatforms'
}

build {
    dependsOn 'jarAllPlatforms'
}

tasks.register('buildAll') {
    group = 'build'
    description = 'Build all minify-html jar variants'
    dependsOn 'jarAllPlatforms'
    platforms.each { variant, ignored ->
        dependsOn "jar${variant}"
    }
}

halo {
    version = '2.25'
}
