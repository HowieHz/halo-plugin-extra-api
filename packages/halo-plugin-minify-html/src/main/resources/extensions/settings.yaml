apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-minify-html-settings
spec:
  forms:
    - group: htmlMinify
      label: HTML 页面压缩
      formSchema:
        - $formkit: switch
          name: enabledHtmlMinify
          id: enabledHtmlMinify
          key: enabledHtmlMinify
          label: 自动压缩
          value: false
          help: 启用后，服务端会对前台 HTML 页面响应进行整体压缩。该功能会完整读取并重写 HTML 响应内容，因此会带来一定的 CPU 和内存开销。
        - $formkit: select
          if: $get(enabledHtmlMinify).value
          name: excludePaths
          id: excludePaths
          key: excludePaths
          label: 排除路径规则
          autoSelect: false
          allowCreate: true
          clearable: true
          multiple: true
          searchable: true
          value:
            - /console/**
            - /uc/**
            - /login/**
            - /signup/**
            - /logout/**
            - /themes/**
            - /plugins/**
            - /assets/**
            - /ui-assets/**
            - /actuator/**
            - /api/**
            - /apis/**
            - /upload/**
          options:
            - label: 控制台（/console/**）
              value: /console/**
            - label: 用户中心（/uc/**）
              value: /uc/**
            - label: 登录（/login/**）
              value: /login/**
            - label: 注册（/signup/**）
              value: /signup/**
            - label: 退出登录（/logout/**）
              value: /logout/**
            - label: 主题资源（/themes/**）
              value: /themes/**
            - label: 插件资源（/plugins/**）
              value: /plugins/**
            - label: 静态资源（/assets/**）
              value: /assets/**
            - label: UI 静态资源（/ui-assets/**）
              value: /ui-assets/**
            - label: 监控/运维（/actuator/**）
              value: /actuator/**
            - label: Halo 核心 API（/api/**）
              value: /api/**
            - label: Halo 扩展 API（/apis/**）
              value: /apis/**
            - label: 上传资源（/upload/**）
              value: /upload/**
          help: 命中这些 Ant 风格路径规则的请求不会进入 HTML 压缩链路。支持 * 和 ** 通配符。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: minifyCss
          id: minifyCss
          key: minifyCss
          label: 压缩内联 CSS
          value: true
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: minifyJs
          id: minifyJs
          key: minifyJs
          label: 压缩内联 JavaScript
          value: true
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: preserveBraceTemplateSyntax
          id: preserveBraceTemplateSyntax
          key: preserveBraceTemplateSyntax
          label: 保留花括号模板语法
          value: false
          help: "遇到 {{ }}, {% %}, {# #} 这类模板片段时保持原样输出。"
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: preserveChevronPercentTemplateSyntax
          id: preserveChevronPercentTemplateSyntax
          key: preserveChevronPercentTemplateSyntax
          label: 保留 <% %> 模板语法
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepClosingTags
          id: keepClosingTags
          key: keepClosingTags
          label: 保留可省略闭合标签
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepComments
          id: keepComments
          key: keepComments
          label: 保留 HTML 注释
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepHtmlAndHeadOpeningTags
          id: keepHtmlAndHeadOpeningTags
          key: keepHtmlAndHeadOpeningTags
          label: 保留 html/head 起始标签
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepInputTypeTextAttr
          id: keepInputTypeTextAttr
          key: keepInputTypeTextAttr
          label: 保留 input[type=text] 属性
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepSsiComments
          id: keepSsiComments
          key: keepSsiComments
          label: 保留 SSI 注释
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: removeBangs
          id: removeBangs
          key: removeBangs
          label: 移除 <! ... > 特殊声明
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: removeProcessingInstructions
          id: removeProcessingInstructions
          key: removeProcessingInstructions
          label: 移除处理指令
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: minifyDoctype
          id: minifyDoctype
          key: minifyDoctype
          label: 压缩 DOCTYPE
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: allowNoncompliantUnquotedAttributeValues
          id: allowNoncompliantUnquotedAttributeValues
          key: allowNoncompliantUnquotedAttributeValues
          label: 允许非规范无引号属性值
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: allowOptimalEntities
          id: allowOptimalEntities
          key: allowOptimalEntities
          label: 允许更激进的实体优化
          value: false
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: allowRemovingSpacesBetweenAttributes
          id: allowRemovingSpacesBetweenAttributes
          key: allowRemovingSpacesBetweenAttributes
          label: 允许移除属性间空格
          value: false
