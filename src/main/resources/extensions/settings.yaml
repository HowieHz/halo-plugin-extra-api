    - group: htmlMinify
      label: HTML 页面压缩（仅全量版可用）
      formSchema:
        - $formkit: switch
          name: enabledHtmlMinify
          id: enabledHtmlMinify
          key: enabledHtmlMinify
          label: 自动压缩
          value: false
          help: 启用后，服务端会对前台 HTML 页面响应进行整体压缩。该功能基于 Halo 的附加 Web 过滤器扩展点（AdditionalWebFilter）实现，需要完整读取并重写 HTML 响应内容，因此会带来一定的 CPU 和内存开销。
        - $formkit: select
          if: $get(enabledHtmlMinify).value
          name: excludePaths
          id: excludePaths
          key: excludePaths
          label: 排除路径规则
          autoSelect: false
          allowCreate: true
          clearable: true
          multiple: true
          searchable: true
          value:
