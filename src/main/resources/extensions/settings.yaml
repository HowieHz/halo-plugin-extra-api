apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-extra-api-settings
spec:
  forms:
    - group: pangu
      label: 中英文混排格式化
      formSchema:
        - $formkit: switch
          name: enabledPanguRender
          id: enabledPanguRender
          key: enabledPanguRender
          label: 自动渲染
          help: 启用之后会自动处理文章和单页中段落标签的中英文混排格式，在中日韩字符与英文、数字、符号之间自动插入空格。注：Finder API 渲染不受此配置项影响。
          value: false
    - group: jsEnginePool
      label: JS 引擎池配置（重启生效）（仅全量版可用）
      formSchema:
        - $formkit: number
          name: poolMinSize
          id: poolMinSize
          key: poolMinSize
          label: 最小池大小
          value: 1
          min: 1
          validation: required
          help: JS 引擎池最少保留的空闲引擎数量。引擎按需创建，创建后会预加载所需的 JS 模块；该值不能设为 0。
        - $formkit: number
          name: poolMaxSize
          id: poolMaxSize
          key: poolMaxSize
          label: 最大池大小
          value: 2
          min: 1
          validation: required
          help: JS 引擎池允许扩容到的最大引擎数量。设置过大可能导致内存占用过高甚至内存溢出。
    - group: shiki
      label: 代码高亮（仅全量版可用）
      formSchema:
        - $formkit: switch
          name: enabledShikiRender
          id: enabledShikiRender
          key: enabledShikiRender
          label: 自动渲染
          help: 启用之后会自动渲染文章和单页中的代码块。注：Finder API 渲染不受此配置项影响。
          value: false
        - $formkit: code
          label: 自定义注入 CSS 样式
          if: $get(enabledShikiRender).value
          name: inlineStyle
          key: inlineStyle
          help: 启用自动渲染时将在页面 head 注入样式以优化 Shiki 渲染效果，默认值提供了边距调整/行号显示/基于媒体查询的明暗切换功能。
          language: css
          height: 150px
          value: |
            div pre.shiki {
              border-radius: 1rem;
              padding: 1rem; !important
            }

            div pre.shiki code {
              counter-reset: count;
              padding: 0; !important
            }

            div.light pre.shiki code {
              display: block;
            }

            div.dark pre.shiki code {
              display: none;
            }

            @media (prefers-color-scheme: dark) {
              div.light pre.shiki code {
                display: none;
              }

              div.dark pre.shiki code {
                display: block;
              }
            }

            div pre.shiki code .line:before {
              content: counter(count);
              counter-increment: count;
              text-align: right;
              color: #24292e80;
              width: 1em;
              margin-right: 1.5rem;
              display: inline-block;
            }

            div.dark pre.shiki code .line:before {
              content: counter(count);
              counter-increment: count;
              text-align: right;
              color: #e1e4e880;
              width: 1rem;
              margin-right: 1.5rem;
              display: inline-block;
            }
        - $formkit: select
          label: 额外注入规则
          if: $get(enabledShikiRender).value
          name: extraInjectPaths
          key: extraInjectPaths
          autoSelect: false
          allowCreate: true
          clearable: true
          multiple: true
          searchable: true
          help: 默认情况下，只有文章和单页会被注入上方的内联样式。如果你希望在其他路径下的页面也注入，请在此添加对应的路径规则，支持通配符 * 。例如 /docs/** 表示 Docsme 生成的所有文档页面都会被注入。
          value:
            - /moments/**
            - /docs/**
          options:
            - label: 瞬间（/moments/**）
              value: /moments/**
            - label: Docsme 文档（/docs/**）
              value: /docs/**
