              value: /console/**
            - label: 用户中心（/uc/**）
              value: /uc/**
            - label: 登录（/login/**）
              value: /login/**
            - label: 注册（/signup/**）
              value: /signup/**
            - label: 退出登录（/logout/**）
              value: /logout/**
            - label: 主题资源（/themes/**）
              value: /themes/**
            - label: 插件资源（/plugins/**）
              value: /plugins/**
            - label: 监控（/actuator/**）
              value: /actuator/**
            - label: Halo 核心 API（/api/**）
              value: /api/**
            - label: Halo 扩展 API（/apis/**）
              value: /apis/**
            - label: 上传资源（/upload/**）
              value: /upload/**
          help: 命中这些 Ant 风格路径规则的请求不会进入 HTML 压缩链路。支持 * 和 ** 通配符；默认值为当前内置的后台、资源和 API 路径。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: minifyCss
          id: minifyCss
          key: minifyCss
          label: 压缩内联 CSS
          value: true
          help: 压缩 style 标签和 style 属性中的 CSS 代码，可减少页面体积。关闭后会保留原始 CSS 内容。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: minifyJs
          id: minifyJs
          key: minifyJs
          label: 压缩内联 JavaScript
          value: true
          help: 压缩 script 标签中的 JavaScript 代码，可进一步减少页面体积。关闭后会保留原始脚本内容。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: preserveBraceTemplateSyntax
          id: preserveBraceTemplateSyntax
          key: preserveBraceTemplateSyntax
          label: 保留花括号模板语法
          value: false
          help: "遇到 {{ }}, {% %}, {# #} 这类模板片段时保持原样输出，避免误压缩服务端或静态站点模板语法。"
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: preserveChevronPercentTemplateSyntax
          id: preserveChevronPercentTemplateSyntax
          key: preserveChevronPercentTemplateSyntax
          label: 保留 <% %> 模板语法
          value: false
          help: 遇到 <% %> 片段时保持原样输出，适用于 JSP、EJS、ERB 等使用该模板分隔符的场景。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepClosingTags
          id: keepClosingTags
          key: keepClosingTags
          label: 保留可省略闭合标签
          value: false
          help: 开启后会保留原本可以省略的闭合标签，例如部分 li、p 等标签的结束标签。关闭时压缩率更高。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepComments
          id: keepComments
          key: keepComments
          label: 保留 HTML 注释
          value: false
          help: 开启后会保留普通 HTML 注释。关闭时会移除这些注释，以减少页面体积。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepHtmlAndHeadOpeningTags
          id: keepHtmlAndHeadOpeningTags
          key: keepHtmlAndHeadOpeningTags
          label: 保留 html/head 起始标签
          value: false
          help: 开启后会保留无属性时原本可省略的 html 和 head 起始标签。关闭时压缩率更高。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepInputTypeTextAttr
          id: keepInputTypeTextAttr
          key: keepInputTypeTextAttr
          label: 保留 input[type=text] 属性
          value: false
          help: 开启后会保留 input 元素默认的 type=text 属性。关闭时会移除这类默认值以减少输出长度。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: keepSsiComments
          id: keepSsiComments
          key: keepSsiComments
          label: 保留 SSI 注释
          value: false
          help: 开启后会保留服务器端包含（SSI）注释。若你的页面或上游代理依赖 SSI，请启用此项。
        - $formkit: switch
          if: $get(enabledHtmlMinify).value
          name: removeBangs
          id: removeBangs
          key: removeBangs
