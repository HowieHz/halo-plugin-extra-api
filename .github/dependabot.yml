# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 1
    groups:
      halo:
        patterns:
          - "run.halo.tools.platform:*"
          - "run.halo.app:api"
          - "run.halo.plugin.devtools"
        update-types:
          - "minor"
          - "patch"
      spring:
        patterns:
          - "org.springframework:*"
          - "org.springframework.boot:*"
          - "org.springframework.data:*"
          - "io.projectreactor:*"
        update-types:
          - "minor"
          - "patch"
      javet:
        patterns:
          - "com.caoccao.javet:*"
        update-types:
          - "minor"
          - "patch"
      lombok:
        patterns:
          - "org.projectlombok:lombok"
          - "io.freefair.lombok"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "org.junit:*"
          - "org.junit.platform:*"
        update-types:
          - "minor"
          - "patch"
      misc:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/buildSrc" # Location of package manifests
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 1
    groups:
      buildsrc-libraries:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/ui" # Location of package manifests
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 1
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/js-modules/shiki" # Location of package manifests
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 1
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 1
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
