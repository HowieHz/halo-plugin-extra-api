name: Check Release Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled
      - unlabeled

jobs:
  guard:
    name: Check Release Constraints
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/tree/v6
        with:
          fetch-depth: 0

      - name: Check release constraints
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          IS_RELEASE_PR: ${{ contains(github.event.pull_request.labels.*.name, 'release') }}
        run: node .github/scripts/check-release-constraints.js

      - name: Resolve release summary
        if: contains(github.event.pull_request.labels.*.name, 'release')
        id: summary
        shell: bash
        run: |
          RELEASE_VERSION=$(sed -n 's/^version=\(.*\)$/\1/p' gradle.properties | tail -n 1 | tr -d '[:space:]')
          PREVIOUS_TAG=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 2 | head -n 1)
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Write summary and comment on PR
        if: contains(github.event.pull_request.labels.*.name, 'release')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # https://github.com/actions/github-script/tree/v9.0.0
        env:
          PREVIOUS_TAG: ${{ steps.summary.outputs.previous_tag }}
          RELEASE_VERSION: ${{ steps.summary.outputs.release_version }}
        with:
          script: |
            const fs = require('node:fs');

            const previousTag = process.env.PREVIOUS_TAG || 'none';
            const releaseVersion = process.env.RELEASE_VERSION || 'unknown';
            const summary = [
              '## Release PR',
              '',
              `- Previous stable release: ${previousTag}`,
              `- Requested release version (from gradle.properties): ${releaseVersion}`,
            ].join('\n');

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`);

            const marker = '<!-- release-guard-comment -->';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## Check Release Guard',
              '',
              `- Previous stable release: ${previousTag}`,
              `- Requested release version (from gradle.properties): ${releaseVersion}`,
              '',
              `Generated by [workflow run](${runUrl}).`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existing = comments
                .filter((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker))
                .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              if (error?.status === 403) {
                console.log('Insufficient permission to comment on PR, summary has been written.');
              } else {
                throw error;
              }
            }
