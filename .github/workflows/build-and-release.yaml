name: Build Plugin and Upload Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  release:
    types:
      - created
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          cache: 'gradle'
          java-version: 21
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          # 新增独立的前端子模块时，记得把对应的 pnpm-lock.yaml 一并加入这里，
          # 否则像 :shiki:pnpmInstall 这类子包安装步骤不会命中预期的 pnpm 缓存键。
          cache-dependency-path: |
            ui/pnpm-lock.yaml
            js-modules/shiki/pnpm-lock.yaml
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build with Gradle
        run: |
          # Set the version with tag name when releasing
          version=${{ github.event.release.tag_name }}
          version=${version#v}
          if [ -n "$version" ]; then
            sed -i "s/version=.*-SNAPSHOT$/version=$version/1" gradle.properties
          fi
          ./gradlew clean buildAll --profile --console=plain
      - name: Summarize Gradle profile
        if: always()
        shell: bash
        run: |
          profile_report=$(ls -t build/reports/profile/profile-*.html 2>/dev/null | head -n 1 || true)
          if [ -z "$profile_report" ]; then
            echo "## Gradle Build Profile" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No Gradle profile report was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          python3 - <<'PY' "$profile_report" >> "$GITHUB_STEP_SUMMARY"
          import re
          import sys
          from pathlib import Path

          report_path = Path(sys.argv[1])
          text = report_path.read_text(encoding="utf-8")

          total_match = re.search(r'<td>Total Build Time</td>\s*<td class="numeric">([^<]+)</td>', text)
          task_rows = re.findall(
              r'<td class="indentPath">([^<]+)</td>\s*<td class="numeric">([^<]+)</td>\s*<td>([^<]*)</td>',
              text
          )

          interesting = []
          for task, duration, result in task_rows:
              if result.strip() in {"UP-TO-DATE", "SKIPPED", "NO-SOURCE", "Did No Work"}:
                  continue
              interesting.append((task, duration))

          print("## Gradle Build Profile")
          print()
          print(f"- Report: `{report_path}`")
          if total_match:
              print(f"- Total build time: `{total_match.group(1)}`")
          print()
          print("### Slowest executed tasks")
          print()
          if interesting:
              for task, duration in interesting[:10]:
                  print(f"- `{task}`: `{duration}`")
          else:
              print("- No executed tasks found in the profile report.")
          PY
      - name: Upload Gradle profile report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-profile-report
          path: build/reports/profile/profile-*.html
          retention-days: 7
      - name: Archive extra-api jar
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-archive
          path: |
            build/libs/*.jar
          retention-days: 1
      - name: Upload extra-api-full-all-platforms
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-full-all-platforms
          path: build/libs/extra-api-full-all-platforms-*.jar
          retention-days: 1
      - name: Upload extra-api-full-linux-arm64
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-full-linux-arm64
          path: build/libs/extra-api-full-linux-arm64-*.jar
          retention-days: 1
      - name: Upload extra-api-full-linux-x86_64
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-full-linux-x86_64
          path: build/libs/extra-api-full-linux-x86_64-*.jar
          retention-days: 1
      - name: Upload extra-api-full-macos-arm64
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-full-macos-arm64
          path: build/libs/extra-api-full-macos-arm64-*.jar
          retention-days: 1
      - name: Upload extra-api-full-macos-x86_64
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-full-macos-x86_64
          path: build/libs/extra-api-full-macos-x86_64-*.jar
          retention-days: 1
      - name: Upload extra-api-full-windows-x86_64
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-full-windows-x86_64
          path: build/libs/extra-api-full-windows-x86_64-*.jar
          retention-days: 1
      - name: Upload extra-api-lite
        uses: actions/upload-artifact@v7
        with:
          name: extra-api-lite
          path: build/libs/extra-api-lite-*.jar
          retention-days: 1

  github-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Download extra-api jar
        uses: actions/download-artifact@v8
        with:
          name: extra-api-archive
          path: build/libs
      - name: Get Name of Artifacts
        id: get_artifacts
        run: |
          ARTIFACT_PATHNAMES=$(ls build/libs/*.jar | paste -sd "," -)
          echo "Artifact pathnames: ${ARTIFACT_PATHNAMES}"
          echo "ARTIFACT_PATHNAMES=${ARTIFACT_PATHNAMES}" >> $GITHUB_ENV
          echo "RELEASE_ID=${{ github.event.release.id }}" >> $GITHUB_ENV
      - name: Upload Release Assets
        uses: actions/github-script@v8
        if: github.event_name == 'release'
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            console.log('environment', process.versions);

            const fs = require('fs').promises;

            const { repo: { owner, repo }, sha } = context;
            console.log({ owner, repo, sha });

            const releaseId = process.env.RELEASE_ID;
            const artifactPathNames = process.env.ARTIFACT_PATHNAMES
              .split(',')
              .filter(Boolean);
            console.log('Releasing', releaseId, artifactPathNames);

            for (const artifactPathName of artifactPathNames) {
              const artifactName = artifactPathName.split('/').pop();
              console.log('Uploading', artifactPathName, artifactName);
              await github.repos.uploadReleaseAsset({
                owner, repo,
                release_id: releaseId,
                name: artifactName,
                data: await fs.readFile(artifactPathName)
              });
            }
