name: Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/tree/v6
        with:
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # https://github.com/actions/setup-java/tree/v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # https://github.com/gradle/actions/tree/v6
        with:
          cache-read-only: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # https://github.com/pnpm/action-setup/tree/v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10.33.0
          run_install: false
      - name: Resolve pnpm cache dependency paths
        id: pnpm-cache-paths
        shell: bash
        run: |
          {
            echo 'paths<<EOF'
            echo 'js-modules/shiki/pnpm-lock.yaml'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # https://github.com/actions/setup-node/tree/v6
        with:
          node-version: 25
          cache: 'pnpm'
          cache-dependency-path: ${{ steps.pnpm-cache-paths.outputs.paths }}
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: gradlew test
        run: |
          ./gradlew test
      # - name: Front test
      #   run: |
      #     cd ui
      #     pnpm test
