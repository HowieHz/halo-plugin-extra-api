name: Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10.22.0
          run_install: false
      - name: Resolve pnpm cache dependency paths
        id: pnpm-cache-paths
        shell: bash
        run: |
          {
            echo 'paths<<EOF'
            echo 'js-modules/shiki/pnpm-lock.yaml'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'pnpm'
          cache-dependency-path: ${{ steps.pnpm-cache-paths.outputs.paths }}
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: gradlew test
        run: |
          ./gradlew test
      # - name: Front test
      #   run: |
      #     cd ui
      #     pnpm test
