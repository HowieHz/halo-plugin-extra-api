name: Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          cache: 'gradle'
          java-version: 21
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          # 新增独立的前端子模块时，记得把对应的 pnpm-lock.yaml 一并加入这里，
          # 否则像 :shiki:pnpmInstall 这类子包安装步骤不会命中预期的 pnpm 缓存键。
          cache-dependency-path: |
            ui/pnpm-lock.yaml
            js-modules/shiki/pnpm-lock.yaml
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: gradlew test
        run: |
          ./gradlew test
      # - name: Front test
      #   run: |
      #     cd ui
      #     pnpm test
